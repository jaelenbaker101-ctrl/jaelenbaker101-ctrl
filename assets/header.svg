<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1">
        <animate attributeName="stop-color" values="#0d1117;#161b22;#1c2128;#0d1117" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#161b22;stop-opacity:1">
        <animate attributeName="stop-color" values="#161b22;#1c2128;#0d1117;#161b22" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#1c2128;stop-opacity:1">
        <animate attributeName="stop-color" values="#1c2128;#0d1117;#161b22;#1c2128" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff">
        <animate attributeName="stop-color" values="#ffffff;#e8e8e8;#f0f0f0;#ffffff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#e8e8e8">
        <animate attributeName="stop-color" values="#e8e8e8;#f0f0f0;#ffffff;#e8e8e8" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d1d5db">
        <animate attributeName="stop-color" values="#d1d5db;#e5e7eb;#f3f4f6;#d1d5db" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#e5e7eb">
        <animate attributeName="stop-color" values="#e5e7eb;#f3f4f6;#d1d5db;#e5e7eb" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <!-- Floating particles -->
    <circle id="particle" r="1.5" fill="#ffffff" opacity="0.4"/>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#grad1)" rx="12"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.04" stroke="#ffffff">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Animated floating particles -->
  <use href="#particle" x="100" y="30">
    <animate attributeName="y" values="30;170;30" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.45;0.15" dur="7s" repeatCount="indefinite"/>
  </use>
  <use href="#particle" x="250" y="150">
    <animate attributeName="y" values="150;40;150" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="9s" repeatCount="indefinite"/>
  </use>
  <use href="#particle" x="400" y="60">
    <animate attributeName="y" values="60;140;60" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.5;0.15" dur="6s" repeatCount="indefinite"/>
  </use>
  <use href="#particle" x="550" y="170">
    <animate attributeName="y" values="170;20;170" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.45;0.2" dur="8s" repeatCount="indefinite"/>
  </use>
  <use href="#particle" x="700" y="50">
    <animate attributeName="y" values="50;160;50" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.4;0.15" dur="10s" repeatCount="indefinite"/>
  </use>
  <use href="#particle" x="820" y="120">
    <animate attributeName="y" values="120;30;120" dur="7.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.45;0.2" dur="7.5s" repeatCount="indefinite"/>
  </use>

  <!-- Name -->
  <text x="450" y="85" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="700" fill="url(#textGrad)" letter-spacing="1">
    Jaelen Baker
  </text>

  <!-- Subtitle -->
  <text x="450" y="125" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="url(#accentGrad)" letter-spacing="3" font-weight="400">
    BUILDER  ·  ENGINEER
  </text>

  <!-- Animated underline -->
  <rect x="300" y="140" width="300" height="2" rx="1" fill="url(#accentGrad)" opacity="0.5">
    <animate attributeName="width" values="0;300;300;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="450;300;300;450" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
